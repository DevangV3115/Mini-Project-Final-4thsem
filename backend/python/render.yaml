services:
  - type: web
    name: reasoning-engine-backend
    runtime: python
    rootDir: backend/python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.12"
